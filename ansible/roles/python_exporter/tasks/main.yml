---
- name: Install Python exporter runtime packages
  ansible.builtin.package:
    name:
      - python3
      - python3-flask
      - python3-prometheus-client
    state: present

- name: Ensure exporter service group exists
  ansible.builtin.group:
    name: guardian-exporter
    system: true
    state: present

- name: Ensure exporter service user exists
  ansible.builtin.user:
    name: guardian-exporter
    group: guardian-exporter
    system: true
    shell: /usr/sbin/nologin
    create_home: false
    state: present

- name: Ensure exporter install directory exists
  ansible.builtin.file:
    path: /opt/guardian-exporter
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Ensure exporter application directory exists
  ansible.builtin.file:
    path: /opt/guardian-exporter/app
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Ensure exporter state directory exists
  ansible.builtin.file:
    path: /opt/guardian-exporter/state
    state: directory
    owner: guardian-exporter
    group: guardian-exporter
    mode: "0755"

- name: Copy exporter runtime files
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../exporter/{{ item }}"
    dest: "/opt/guardian-exporter/app/{{ item }}"
    owner: root
    group: root
    mode: preserve
  loop:
    - pyproject.toml
    - src

- name: Place exporter state seed file
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../exporter/state/sample_metrics.json"
    dest: /opt/guardian-exporter/state/sample_metrics.json
    owner: guardian-exporter
    group: guardian-exporter
    mode: "0644"

- name: Install exporter systemd unit
  ansible.builtin.template:
    src: guardian-exporter.service.j2
    dest: /etc/systemd/system/guardian-exporter.service
    owner: root
    group: root
    mode: "0644"

- name: Ensure exporter service is enabled and running
  ansible.builtin.systemd:
    name: guardian-exporter
    enabled: true
    state: restarted
    daemon_reload: true
