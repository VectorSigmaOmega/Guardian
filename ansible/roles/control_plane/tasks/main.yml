---
- name: Ensure control-plane directory exists
  ansible.builtin.file:
    path: /opt/guardian
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Validate required control-plane environment
  ansible.builtin.assert:
    that:
      - lookup('ansible.builtin.env', item) | length > 0
    fail_msg: "{{ item }} must be set in the Ansible runner environment"
  loop:
    - SLACK_WEBHOOK_URL
    - GRAFANA_ADMIN_PASSWORD
    - WEBHOOK_INTERNAL_TOKEN
    - GUARDIAN_HMAC_SECRET
    - GRAFANA_HOST
    - WEBHOOK_HOST

- name: Ensure webhook SSH secrets directory exists
  ansible.builtin.file:
    path: /opt/guardian/secrets/ssh
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Install Docker runtime packages
  ansible.builtin.package:
    name:
      - docker.io
      - docker-compose-v2
    state: present

- name: Ensure Docker service is running
  ansible.builtin.service:
    name: docker
    enabled: true
    state: started

- name: Copy docker-compose file to control plane
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../docker-compose.yml"
    dest: /opt/guardian/docker-compose.yml
    owner: root
    group: root
    mode: "0644"

- name: Copy Caddyfile to control plane
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../Caddyfile"
    dest: /opt/guardian/Caddyfile
    owner: root
    group: root
    mode: "0644"

- name: Render Docker Compose environment file
  ansible.builtin.template:
    src: env.j2
    dest: /opt/guardian/.env
    owner: root
    group: root
    mode: "0600"

- name: Copy Guardian deploy key for drill remediation
  ansible.builtin.copy:
    src: "{{ lookup('ansible.builtin.env', 'HOME') }}/.ssh/guardian_deploy_ed25519"
    dest: /opt/guardian/secrets/ssh/guardian_deploy_ed25519
    owner: root
    group: root
    mode: "0600"

- name: Ensure control-plane subdirectories exist
  ansible.builtin.file:
    path: "/opt/guardian/{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - prometheus
    - prometheus/rules
    - prometheus/targets
    - grafana
    - webhook
    - exporter

- name: Copy Prometheus base configuration
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../prometheus/prometheus.yml"
    dest: /opt/guardian/prometheus/prometheus.yml
    owner: root
    group: root
    mode: preserve

- name: Copy Prometheus rule files
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../prometheus/rules/"
    dest: /opt/guardian/prometheus/rules/
    owner: root
    group: root
    mode: preserve

- name: Copy Grafana configuration
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../grafana/"
    dest: /opt/guardian/grafana/
    owner: root
    group: root
    mode: preserve

- name: Copy webhook runtime files
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../webhook/{{ item }}"
    dest: "/opt/guardian/webhook/{{ item }}"
    owner: root
    group: root
    mode: preserve
  loop:
    - Dockerfile
    - app.py
    - config
    - pyproject.toml
    - runbooks

- name: Copy demo exporter runtime files
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../exporter/{{ item }}"
    dest: "/opt/guardian/exporter/{{ item }}"
    owner: root
    group: root
    mode: preserve
  loop:
    - Dockerfile
    - pyproject.toml
    - src
    - state

- name: Render Alertmanager configuration
  ansible.builtin.template:
    src: alertmanager.yml.j2
    dest: /opt/guardian/alertmanager/alertmanager.yml
    owner: root
    group: root
    mode: "0644"

- name: Render node exporter service discovery targets
  ansible.builtin.template:
    src: node-exporter.yml.j2
    dest: /opt/guardian/prometheus/targets/node-exporter.yml
    owner: root
    group: root
    mode: "0644"

- name: Render Python exporter service discovery targets
  ansible.builtin.template:
    src: python-exporter.yml.j2
    dest: /opt/guardian/prometheus/targets/python-exporter.yml
    owner: root
    group: root
    mode: "0644"

- name: Start control-plane stack
  ansible.builtin.command:
    cmd: docker compose up -d --build
    chdir: /opt/guardian
  changed_when: true
