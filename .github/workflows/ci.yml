name: CI

on:
  push:
  pull_request:

jobs:
  python-quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [exporter, webhook]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install component and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "./${{ matrix.component }}[dev]"

      - name: Lint
        run: ruff check "${{ matrix.component }}"

      - name: Run tests
        run: pytest "${{ matrix.component }}/tests"

  ansible-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ansible-lint
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core ansible-lint

      - name: Lint Ansible
        run: ansible-lint ansible/site.yml

